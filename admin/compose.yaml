configs:
  dwb-admin_config:
    file: ./config/dev.json

networks:
  dwb:
    driver: bridge

services:
  dwb-admin:
    env_file: ../.env
    build: ./
    restart: always
    configs:
      - source: dwb-admin_config
        target: /service/config/service.json
    networks:
      - dwb
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://dwb-admin:3000/api/v1/readyz"]
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: always
    volumes:
      - ./web/dist:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - dwb
    ports:
      - "3000:3000"

  dozzle:
    restart: always
    image: amir20/dozzle:latest
    # environment:
    #   DOZZLE_ENABLE_ACTION: true
    #   DOZZLE_ENABLE_SHELL: true
    volumes:
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/var/run/docker.sock:ro
    networks:
      - dwb
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      start_period: 30s
