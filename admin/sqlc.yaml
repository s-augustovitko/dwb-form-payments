version: "2"
sql:
  - engine: "mysql"
    queries: "./queries/*.sql"
    schema: "../migrations/*.up.sql"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "database/sql"
        sql_driver: "github.com/go-sql-driver/mysql"
        emit_empty_slices: true
        emit_enum_valid_method: true

